{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "universal-app.fullname" . }}

  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

spec:

  ingressClassName: {{ .Values.ingress.className }}

  {{- if .Values.tls.enabled }}

  tls:
    - hosts:
      - {{ if eq .Values.routing.mode "subdomain" }}
        {{ .Release.Name }}.{{ .Values.routing.domain }}
        {{ else }}
        {{ .Values.routing.domain }}
        {{ end }}
      secretName: {{ .Values.tls.secretName }}

  {{- end }}

  rules:

  {{- if eq .Values.routing.mode "path" }}

  - host: {{ .Values.routing.domain }}

    http:
      paths:

        - path: /{{ .Release.Name }}
          pathType: Prefix

          backend:
            service:
              name: {{ include "universal-app.fullname" . }}
              port:
                number: {{ .Values.service.port }}

  {{- else }}

  - host: {{ .Release.Name }}.{{ .Values.routing.domain }}

    http:
      paths:

        - path: /
          pathType: Prefix

          backend:
            service:
              name: {{ include "universal-app.fullname" . }}
              port:
                number: {{ .Values.service.port }}

  {{- end }}

{{- end }}